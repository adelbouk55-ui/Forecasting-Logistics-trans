version: '3.8'

services:
  forecasting-api:
    build: .
    container_name: forecasting-logistics-api
    ports:
      - "5000:5000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - DEFAULT_MODEL=prophet
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    networks:
      - forecasting-network
    restart: unless-stopped

networks:
  forecasting-network:
    driver: bridge
